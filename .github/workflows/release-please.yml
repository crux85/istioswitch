name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
          package-name: istioswitch
          token: ${{ secrets.RELEASE_TOKEN }}

  build-and-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: istioswitch
            asset_name: istioswitch-linux-amd64
          - os: macos-latest
            artifact_name: istioswitch
            asset_name: istioswitch-darwin-amd64
          - os: windows-latest
            artifact_name: istioswitch.exe
            asset_name: istioswitch-windows-amd64.exe

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          
      - name: Install dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build binary with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        run: pyinstaller --onefile --name istioswitch src/istioswitch/cli.py

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install -e .
          pip install "nuitka[onefile]" zstandard

      # Setup Nuitka caching to speed up compilation
      - name: Setup Nuitka Cache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\Nuitka\Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('src/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml') }}-
            ${{ runner.os }}-nuitka-

      - name: Build binary with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: python -m nuitka --onefile --assume-yes-for-downloads --output-dir=dist --output-filename=istioswitch.exe --follow-imports --remove-output src/istioswitch/cli.py
        
      - name: Rename artifact for release (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/istioswitch dist/${{ matrix.asset_name }}
        
      - name: Rename artifact for release (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item -Path dist\istioswitch.exe -NewName ${{ matrix.asset_name }}
        
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/${{ matrix.asset_name }}

  publish-pypi:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Required for PyPI Trusted Publisher
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          
      - name: Install build tool
        run: pip install build
        
      - name: Build package
        run: python -m build
        
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0

  publish-winget:
    needs: [release-please, build-and-publish]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Submit package to WinGet
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: crux85.istioswitch
          version: ${{ needs.release-please.outputs.tag_name }}
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
