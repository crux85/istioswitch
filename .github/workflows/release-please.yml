name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
          package-name: istioswitch

  build-and-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: istioswitch
            asset_name: istioswitch-linux-amd64
          - os: macos-latest
            artifact_name: istioswitch
            asset_name: istioswitch-darwin-amd64
          - os: windows-latest
            artifact_name: istioswitch.exe
            asset_name: istioswitch-windows-amd64.exe

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile --name istioswitch src/istioswitch/cli.py
        
      - name: Rename artifact for release (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/istioswitch dist/${{ matrix.asset_name }}
        
      - name: Rename artifact for release (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item -Path dist\istioswitch.exe -NewName ${{ matrix.asset_name }}
        
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/${{ matrix.asset_name }}
